<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Satyam Saxena builds computer vision, railway inspection, GPS, and applied AI systems.">
  <meta name="theme-color" content="#8ac8c5">
  <meta property="og:title" content="Satyam Saxena - Applied AI Engineer">
  <meta property="og:description" content="Explore a tiny world of computer vision, railway AI, and practical engineering.">
  <title>Satyam Saxena - Applied AI Engineer</title>
  <link rel="canonical" href="https://satyamsaxena1.github.io/">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="loading" id="loading" aria-live="polite">
    <div class="envelope" aria-hidden="true"><span></span></div>
    <strong>BUILDING YOUR WORLD</strong>
  </div>

  <main class="experience" id="experience">
    <canvas id="world" aria-label="Interactive illustrated planet representing Satyam Saxena's engineering projects"></canvas>
    <div class="paper-grain" aria-hidden="true"></div>

    <header class="topbar">
      <a class="mini-logo" href="#" aria-label="Satyam Saxena home"><span>SS</span> WORLD</a>
      <p>APPLIED AI ENGINEER<br><span>LUCKNOW, INDIA</span></p>
      <a class="sound-button" href="https://github.com/SatyamSaxena1" aria-label="Open GitHub profile">GITHUB <b>&nearr;</b></a>
    </header>

    <section class="intro" id="intro" aria-labelledby="main-title">
      <p class="eyebrow">A SMALL PLANET OF BIG SYSTEMS</p>
      <h1 id="main-title" aria-label="Satyam Saxena"><span>SATYAM</span><span>SAXENA</span></h1>
      <p class="intro-copy">Computer vision, railway inspection, GPS context,<br>and software built for the real world.</p>
      <button class="enter-button" id="enter" type="button"><span>EXPLORE THE PLANET</span><b>&darr;</b></button>
    </section>

    <div class="project-markers" id="project-markers" aria-label="Projects">
      <button class="marker" data-project="railway" style="--angle:0"><i>01</i><span>RAILWAY VISION</span></button>
      <button class="marker" data-project="captions" style="--angle:1"><i>02</i><span>LIVE CAPTIONS</span></button>
      <button class="marker" data-project="highway" style="--angle:2"><i>03</i><span>FUZZY HIGHWAY</span></button>
      <button class="marker" data-project="mindmap" style="--angle:3"><i>04</i><span>MIND MAP</span></button>
    </div>

    <div class="zone-title" id="zone-title" aria-hidden="true">VISION DISTRICT</div>

    <nav class="dock" aria-label="Portfolio sections">
      <button type="button" data-panel="about"><span>?</span>ABOUT</button>
      <button type="button" data-panel="stack"><span>#</span>TOOLBOX</button>
      <button type="button" data-project="railway"><span>!</span>FEATURED</button>
      <a href="https://github.com/SatyamSaxena1"><span>&nearr;</span>GITHUB</a>
    </nav>

    <div class="drag-hint" id="drag-hint"><span>&larr;</span> DRAG TO ROTATE <span>&rarr;</span></div>

    <aside class="panel" id="panel" aria-live="polite" aria-hidden="true">
      <button class="panel-close" id="panel-close" type="button" aria-label="Close panel">&times;</button>
      <p class="panel-kicker" id="panel-kicker">PROJECT 01</p>
      <h2 id="panel-title">Railway Vision</h2>
      <p id="panel-copy"></p>
      <div class="panel-tags" id="panel-tags"></div>
      <div class="panel-links" id="panel-links"></div>
      <p class="panel-note" id="panel-note"></p>
    </aside>

    <noscript><p class="noscript">This interactive portfolio needs JavaScript. Projects are available at <a href="https://github.com/SatyamSaxena1">github.com/SatyamSaxena1</a>.</p></noscript>
  </main>
  <script src="script.js"></script>
</body>
</html>
